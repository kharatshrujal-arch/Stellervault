name: StellarVault Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:          # allow manual triggers from the GitHub UI

# Only run one deployment at a time; cancel any in-progress run
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build the frontend
  # ──────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: stellar-vault-dist
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Job 2: Deploy to Vercel (Production)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    needs: build
    runs-on: ubuntu-latest
    # Only deploy when the Vercel secrets are available
    if: ${{ vars.SKIP_DEPLOY != 'true' }}

    environment:
      name: production
      url: https://stellar-vault-d-app.vercel.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: stellar-vault-dist
          path: dist/

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment config
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel Production
        id: deploy
        run: |
          URL=$(vercel deploy --prod --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
